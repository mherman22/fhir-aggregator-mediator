name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests
        run: npm test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fhir-aggregator-mediator:${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d --name test-mediator fhir-aggregator-mediator:${{ github.sha }}
          sleep 3
          docker logs test-mediator 2>&1 | grep -q "Validating"
          docker stop test-mediator
