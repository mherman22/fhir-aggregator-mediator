name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'fix'
        type: choice
        options:
          - fix
          - minor
          - major
      release_stage:
        description: 'Release stage'
        required: true
        default: 'final'
        type: choice
        options:
          - alpha
          - beta
          - final
          - snapshot

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump semantic version
        id: version_bump
        uses: mherman22/semantic-version-bump-action@v2
        with:
          version-type: ${{ github.event.inputs.version_type }}
          release-stage: ${{ github.event.inputs.release_stage }}
          frontend-file: 'package.json'

      - name: Create release notes
        id: release_notes
        uses: johnyherangi/create-release-notes@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          format: "- {{subject}} by @{{author}}"

      - name: Create semantic release
        id: create_release
        uses: mherman22/semantic-release-creator-action@v2.1
        with:
          release-tag: ${{ steps.version_bump.outputs.release-tag }}
          changelog: |
            # Release ${{ steps.version_bump.outputs.release-tag }}

            ## What's Changed

            ${{ steps.release_notes.outputs.release-notes }}

            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version_bump.outputs.new-version }}
            ```
          stage-label: ${{ steps.version_bump.outputs.stage-label }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          next-dev-version: ${{ steps.version_bump.outputs.next-dev-version }}
          frontend-file: 'package.json'

      - name: Summary
        run: |
          echo "🎉 Successfully released ${{ steps.version_bump.outputs.release-tag }}!"
          echo "📝 Release notes generated automatically"
          echo "🏷️ Git tag created and pushed"
          echo "📦 GitHub Release created: ${{ steps.create_release.outputs.release-url }}"
          echo "🔄 Next development version: ${{ steps.version_bump.outputs.next-dev-version }}"
          echo "🐳 Docker image will be built by release workflow"
          echo "🚀 Ready for deployment!"
